<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byte Breaker</title>
    <link rel="stylesheet" href="byte.css">
    <link rel="icon" type="image/x-icon" href="favicon.png">
</head>

<body>

    <!-- MENU PARTICLE CANVAS-->
    <canvas id="menuCanvas"></canvas>

    <!-- START MENU -->
    <div id="start-screen" class="screen">
        <div class="menu-inner">
            <h1 class="title">BYTE BREAKER</h1>
            <p class="menu-sub">NEON ARCADE · BREAK IT ALL</p>
            <div class="menu-buttons">
                <button id="play-btn">▶ &nbsp;Play</button>
                <button id="levels-btn">⊞ &nbsp;Levels</button>
                <button id="settings-btn">⚙ &nbsp;Settings</button>
            </div>
        </div>
    </div>

    <!-- LEVEL SELECT -->
    <div id="level-screen" class="screen hidden">
        <h2>Select Level</h2>
        <div id="level-list"></div>
        <button id="back-to-menu">Back</button>
    </div>

    <!-- SETTINGS -->
    <div id="settings-screen" class="screen hidden">
        <div class="settings-card">
            <h2>Settings</h2>

            <div class="settings-row">
                <span class="settings-label">🔊 Sound</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="sound-toggle" checked>
                    <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </label>
            </div>

            <div class="settings-row">
                <span class="settings-label">✦ Particles</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="particles-toggle" checked>
                    <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </label>
            </div>

            <div class="settings-divider"></div>
            <button id="settings-back">← Back</button>
        </div>
    </div>

    <!-- GAME UI SIDEBAR -->
    <div id="game-ui" class="hidden">

        <!-- Branding -->
        <div class="sb-brand">BYTE<br>BREAKER</div>

        <!-- Score block -->
        <div class="sb-section">
            <div class="sb-label">SCORE</div>
            <div id="score" class="sb-value sb-score">0</div>
            <div class="sb-label" style="margin-top:8px">BEST</div>
            <div id="high-score" class="sb-value sb-best">0</div>
        </div>

        <div class="sb-divider"></div>

        <!-- Lives -->
        <div class="sb-section">
            <div class="sb-label">LIVES</div>
            <div id="lives" class="sb-lives">●●●●●</div>
        </div>

        <div class="sb-divider"></div>

        <!-- Level -->
        <div class="sb-section">
            <div class="sb-label">LEVEL</div>
            <div id="level-num" class="sb-value sb-level-num">1</div>
            <div id="level-name" class="sb-level-name">Boot Sector</div>
        </div>

        <div class="sb-divider"></div>

        <!-- Bricks remaining -->
        <div class="sb-section">
            <div class="sb-label">BRICKS</div>
            <div id="sb-bricks" class="sb-value">—</div>
        </div>

        <div class="sb-divider"></div>

        <!-- Active powerups -->
        <div class="sb-section" id="sb-pu-section">
            <div class="sb-label">POWER-UPS</div>
            <div id="sb-powerups">
                <div class="sb-pu-empty">none active</div>
            </div>
        </div>

        <div class="sb-divider"></div>

        <!-- Combo -->
        <div class="sb-section">
            <div class="sb-label">COMBO</div>
            <div id="sb-combo" class="sb-value sb-combo-val">—</div>
        </div>

        <!-- Spacer then controls hint -->
        <div style="flex:1"></div>
        <div class="sb-hint">
            <div>← → / A D  move</div>
            <div>SPACE  launch / laser</div>
            <div>P / ESC  pause</div>
        </div>

    </div>

    <!-- POWER-UP BANNER (flash only) -->
    <div id="powerup-ui" class="hidden">
        <span id="powerup-text"></span>
    </div>

    <!-- GAME CANVAS -->
    <canvas id="gameCanvas" width="900" height="600"></canvas>

    <!-- PAUSE MENU -->
    <div id="pause-screen" class="screen hidden">
        <h2>Paused</h2>
        <button id="resume-btn">Resume</button>
        <button id="pause-menu-btn">Menu</button>
    </div>

    <!-- GAME OVER -->
    <div id="game-over" class="screen hidden">
        <h2>Game Over</h2>
        <p id="final-score"></p>
        <button id="retry-btn">Retry</button>
        <button id="gameover-menu-btn">Menu</button>
    </div>

    <script src="byte.js"></script>
</body>
</html>
